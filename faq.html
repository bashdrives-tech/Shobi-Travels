<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequently Asked Questions | Shobi Travels</title>
    
    <!-- Outfit Font (Exact geometric look from screenshot) + Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary-dark: #050814; 
            --accent-yellow: #ffb300; 
            --bg-light: #f4f6fa; 
            --text-dark: #0f172a; 
            --text-light: #ffffff; 
            --text-muted: #64748b; 
            --wa-green: #25d366; 
            --border-radius-lg: 32px; 
            --border-radius-md: 16px; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', 'Poppins', sans-serif; }
        body { 
            background-color: var(--primary-dark); 
            color: var(--text-light); 
            display: flex; 
            justify-content: center; 
            background-image: radial-gradient(circle at 50% 0%, #111634 0%, #050814 100%);
            background-attachment: fixed;
            position: relative;
        }
        
        .app-container { 
            width: 100%; max-width: 480px; background-color: transparent; 
            position: relative; min-height: 100vh; padding-bottom: 110px; overflow-x: hidden; 
        }
        
        /* HEADER (Transparent Fixed Style - scrolls with page) */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 16px; 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 20px; 
            position: fixed; 
            top: 15px; 
            left: 50%; 
            transform: translateX(-50%); 
            width: calc(100% - 30px); 
            max-width: 450px; 
            z-index: 1000; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        .header-spacer {
            height: 85px; /* Offset to prevent fixed header from covering top of hero content */
            width: 100%;
        }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; font-size: 1.1rem; text-decoration: none; color: white; letter-spacing: 0.5px; }
        .logo-icon { 
            background: var(--accent-yellow); 
            color: var(--primary-dark); 
            width: 32px; height: 32px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 8px; 
            font-weight: 900;
            font-size: 1.1rem;
        }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn { width: 38px; height: 38px; border-radius: 10px; border: none; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.2s; }
        .btn-call-yellow { background: var(--accent-yellow); color: var(--primary-dark); text-decoration: none; font-size: 1rem; }
        
        /* HERO SECTION */
        .hero { padding: 10px 20px 25px; text-align: center; }
        .badge { 
            display: inline-block; 
            border: 1px solid rgba(255, 179, 0, 0.25); 
            color: var(--accent-yellow); 
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 0.65rem; 
            font-weight: 700; 
            letter-spacing: 1.5px; 
            margin-bottom: 20px; 
            background: rgba(255, 179, 0, 0.05); 
            text-transform: uppercase;
        }
        .hero h1 { font-size: 2.1rem; font-weight: 900; line-height: 1.15; margin-bottom: 12px; text-transform: uppercase; letter-spacing: -0.5px; }
        .hero h1 span { color: var(--accent-yellow); }
        .hero p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.6; margin-bottom: 25px; padding: 0 10px; }

        /* FAQ CONTENT AREA (Sleek Floating Card Look with Rounded Gap Margins) */
        .faq-section { 
            background: #ffffff; 
            border-radius: var(--border-radius-lg); 
            padding: 35px 24px 40px; 
            color: var(--text-dark); 
            margin: 10px 15px 30px 15px; 
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15); 
        }
        .faq-item { 
            background: #ffffff; 
            border-radius: 14px; 
            margin-bottom: 15px; 
            overflow: hidden; 
            border: 1px solid #e2e8f0; 
            transition: all 0.2s; 
        }
        .faq-item.active {
            border-color: var(--accent-yellow);
            background: #fffdf4;
        }
        .faq-question { 
            width: 100%; text-align: left; padding: 20px; background: none; border: none; font-size: 0.92rem; font-weight: 800; color: var(--text-dark); cursor: pointer; display: flex; justify-content: space-between; align-items: center; letter-spacing: 0.2px; 
        }
        .faq-question span { 
            font-size: 1.15rem; color: var(--accent-yellow); transition: transform 0.3s; font-weight: 800; 
        }
        .faq-item.active .faq-question span { 
            transform: rotate(45deg); color: #cc8e00; 
        }
        .faq-answer { 
            padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; 
        }
        .faq-item.active .faq-answer { 
            padding-bottom: 20px; max-height: 300px; 
        }

        /* HIGH-CONVERTING GOOGLE ADS SPLIT STICKY BOTTOM BAR */
        .fixed-bottom { 
            position: fixed; 
            bottom: 15px; 
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 450px; 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 10px 12px; 
            display: flex; 
            gap: 10px; 
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 10px 35px rgba(0,0,0,0.15); 
            z-index: 1000; 
        }
